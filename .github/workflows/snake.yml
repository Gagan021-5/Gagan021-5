name: Auto Daily Commits

on:
  schedule:
    - cron: '0 9 * * *'   # First commit — 9:00 AM UTC daily
    - cron: '0 18 * * *'  # Second commit — 6:00 PM UTC daily
  workflow_dispatch:       # Lets you trigger it manually too

jobs:
  auto-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Make a change
        run: |
          echo "Auto commit on $(date)" >> auto_log.txt

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: auto commit $(date '+%Y-%m-%d %H:%M')"
          git push
